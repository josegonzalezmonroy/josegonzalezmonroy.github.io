<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css"
        integrity="sha512-NmLkDIU1C/C88wi324HBc+S2kLhi08PN5GDeUVVVC/BVt/9Izdsc9SVeVfA1UZbY3sHUlDSyRXhCzHfr6hmPPw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="/styles/style.css">
    <link rel="stylesheet" href="/api consulta/style-api.css">
    <link rel="shortcut icon" href="https://cdn.iconscout.com/icon/free/png-256/code-280-460136.png"
        type="image/x-icon">
    <title>José González</title>
</head>

<body>
    <header class="cabecalho">
        <div class="avatar-mini">
            <img class="avatar-imagem-mini" src="/images/jose - Copia.jpg" alt="Foto de perfil">
        </div>
        <a class="nav-interna" id="nav-apresentacao" href="/index.html#apresentacao">Apresentação</a>
        <a class="nav-interna" href="/index.html#estudos">Estudos</a>
        <a class="nav-interna" href="/index.html#experiencia">Experiência</a>
        <a class="nav-interna" href="/index.html#projetos">Projetos</a>
        <a class="nav-interna" href="/index.html#contato">Contato</a>
    </header>
    <section class="api">
        <div id="titulo">
            <h1>Consulta de CEP</h1>
        </div>
        <section>
            <form id="formulario">
                <label>CEP:<input id="cep" type="text" placeholder="Digite seu CEP aquí"></label>
                <!-- <label>Idade: <input id="idade" type="number" placeholder="Escreva a idade aquí" required></label> -->
                <!-- <label>Cor favorita: <input id="cor" type="text" placeholder="Escreva a cor favorita aquí"required></label> -->
                <button id="botaoRegistrar" type="submit">Consultar</button>
            </form>

            <p>Dados do CEP informado: <span></span> </p>
            <br>
            <ul id="cepList">
                <li style="list-style:none;"></li>
            </ul>
        </section>
    </section>

    <section class="contato" id="contato">
        <h2 id="contato-titleh2">Contato</h2>
        <nav class="redes-sociais">
            <a id="gmail" href="mailto:josegonzalezmonroy@gmail.com">
                <img id="gmail-icon" src="https://cdn.icon-icons.com/icons2/2631/PNG/512/gmail_new_logo_icon_159149.png"
                    alt=""><span>Email</span></a>
            <a id="twitter" href="https://twitter.com/kaspablovfisch" target="_blank" rel="noopener noreferrer">
                <img id="twitter-icon" src="https://logodownload.org/wp-content/uploads/2014/09/twitter-logo-4.png"
                    alt=""><span>Twitter</span></a>
            <a id="instagram" href="https://www.instagram.com/josegonzalezmonroy/" target="_blank"
                rel="noopener noreferrer"><img id="instagram-icon"
                    src="https://cdn2.iconfinder.com/data/icons/social-media-2285/512/1_Instagram_colored_svg_1-512.png"
                    alt="">
                <span>Instagram</span></a>

        </nav>
    </section>

    <section class="contato-formulario">
        <legend>
            <h3 id="contato-titleh3">Se preferir, deixe uma mensagem</h3>
        </legend>
        <form id="formulario">
            <label>Nome<span id="erro-nome"></span><br><input id="nome" type="text" name="nome" placeholder="Seu nome"
                    required></label><br>
            <label>Sobrenome<span id="erro-sobrenome"></span><br><input id="sobrenome" type="text" name="sobrenome"
                    placeholder='Seu sobrenome' required></label><br>
            <label>Email<span id="erro-email"></span><br><input id="email" type="text" name="email"
                    placeholder="seuemail@domain.com" required></label><br>
            <label for="note">Sua mensagem <span id="erro-mensagem"></span></label><br>
            <textarea id="mensagem" name="note" id="note" cols="30" rows="10" placeholder="Escreva sua mensagem aquí"
                required></textarea><br>
        </form>
        <div id="botoes-form">
            <input id="limpar" class="button" type="reset" value="Limpar formulário">
            <input id="enviar" class="button" type="submit" value="Enviar" disabled>

        </div>
        <div><span id="sucesso"></span></div>

    </section>

    <footer>
        <p>Realizado por José González</p>
    </footer>

    <script src="/api consulta/apiconsulta.js"></script>
</body>

</html>
